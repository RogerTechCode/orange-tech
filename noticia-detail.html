    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                window.location.href = 'noticias.html';
                return;
            }

            try {
                const newsList = await Storage.get('news');
                const newsItem = newsList.find(n => n.id === id);

                if (newsItem) {
                    renderArticle(newsItem);
                } else {
                    document.getElementById('loading-state').innerHTML = `
                        <p class="text-white font-bold uppercase tracking-widest text-sm mb-4">Notícia não encontrada</p>
                        <a href="noticias.html" class="text-orange-primary font-bold underline">Voltar para notícias</a>
                    `;
                }
            } catch (error) {
                console.error("Erro ao carregar noticia:", error);
                document.getElementById('loading-state').innerHTML = `<p class="text-red-500">Erro ao carregar dados.</p>`;
            }
        });

        function renderArticle(item) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('hero-content').classList.remove('hidden');
            document.getElementById('news-main-container').classList.remove('hidden');

            document.getElementById('news-title').textContent = item.title;
            document.getElementById('news-excerpt').textContent = item.excerpt || "";
            document.getElementById('news-body').textContent = item.content;

            if (item.imageUrl) {
                document.getElementById('news-image-hero').src = item.imageUrl;
            }

            if (item.date) {
                const dateObj = new Date(item.date);
                document.getElementById('news-date').textContent = dateObj.toLocaleDateString('pt-BR', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
            }

            if (item.link) {
                const linkBtn = document.getElementById('news-external-link');
                const linkContainer = document.getElementById('news-external-link-container');
                if (linkBtn && linkContainer) {
                    let finalLink = item.link.trim();
                    if(!finalLink.startsWith('http://') && !finalLink.startsWith('https://')) {
                        finalLink = 'https://' + finalLink;
                    }
                    linkBtn.href = finalLink;
                    linkContainer.classList.remove('hidden');
                }
            }

            document.title = `${item.title} - Orange FC`;
        }
    </script>
