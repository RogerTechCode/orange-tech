<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Orange FC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            500: '#f05137',
                            600: '#d9412a'
                        }
                    },
                    fontFamily: { 'poppins': ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col md:flex-row admin-body">
    <!-- Mobile Header -->
    <header
        class="md:hidden bg-gray-900 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-40 w-full">
        <div class="flex items-center space-x-3">
            <img src="ORANGE 3 (1).png" alt="Orange FC" class="w-10 h-10 object-contain drop-shadow-md">
            <h2 class="text-lg font-black font-poppins text-white uppercase tracking-tighter">ORANGE</h2>
        </div>
        <button id="mobile-menu-btn" class="p-2 text-gray-400 hover:text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>
    </header>

    <!-- Sidebar (Desktop/Tablet) -->
    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden lg:block sticky top-0 h-screen overflow-y-auto">
        <div class="p-6 flex items-center space-x-3">
            <img src="ORANGE 3 (1).png" alt="Orange FC" class="w-10 h-10 object-contain drop-shadow-md">
            <h2 class="text-xl font-black font-poppins text-white uppercase tracking-tighter">ORANGE</h2>
        </div>
        <nav class="mt-6 px-4">
            <a href="index.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-800 transition-all text-gray-400 hover:text-white border-b border-gray-800 mb-4 pb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Sair pro Site</span>
            </a>
            <a href="dashboard.html"
                class="flex items-center space-x-3 p-3 rounded-lg bg-orange-600 text-white font-bold"><span>Dashboard</span></a>
            <a href="news.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-800 transition-all"><span>Notícias</span></a>
            <a href="team.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-800 transition-all text-gray-400 hover:text-white"><span>Equipe</span></a>
            <a href="sponsors.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-800 transition-all text-gray-400 hover:text-white"><span>Parceiros</span></a>
            <a href="backup.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-800 transition-all border-t border-gray-800 mt-4 pt-4"><span>Backup
                    & Suporte</span></a>
            <button id="logout-btn-desktop"
                class="w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-red-900/50 text-red-400 mt-8 transition-all"><span>Sair</span></button>
        </nav>
    </aside>

    <!-- Mobile Menu Overlay -->
    <div id="admin-mobile-menu" class="fixed inset-0 bg-gray-900/95 z-50 p-6 flex flex-col hidden lg:hidden">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-3">
                <img src="ORANGE 3 (1).png" alt="Orange FC" class="w-12 h-12 object-contain drop-shadow-md">
                <h2 class="text-xl font-black font-poppins text-white uppercase tracking-tighter">ORANGE</h2>
            </div>
            <button id="mobile-menu-close" class="p-2 text-gray-400 hover:text-white transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <nav class="space-y-4 text-center">
            <a href="index.html" class="block text-2xl font-bold p-4 text-gray-400 hover:text-white">Sair pro
                Site</a>
            <a href="dashboard.html" class="block text-3xl font-black p-4 text-orange-500">Dashboard</a>
            <a href="news.html" class="block text-2xl font-bold p-4 text-white">Notícias</a>
            <a href="team.html" class="block text-2xl font-bold p-4 text-white">Equipe</a>
            <a href="sponsors.html" class="block text-2xl font-bold p-4 text-white">Parceiros</a>
            <a href="backup.html" class="block text-2xl font-bold p-4 text-gray-400">Backup & Suporte</a>
            <button id="logout-btn-mobile" class="w-full text-2xl font-bold p-4 text-red-500 mt-10">Sair</button>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8 lg:p-12">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
            <div id="user-info" class="text-gray-600">Olá, Júlio Pereira!</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-gray-400 text-sm font-bold uppercase">Notícias</h3>
                <p id="news-count" class="text-3xl font-bold text-gray-800 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-gray-400 text-sm font-bold uppercase">Equipe Orange</h3>
                <p id="players-count" class="text-3xl font-bold text-gray-800 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-gray-400 text-sm font-bold uppercase">Parceiros</h3>
                <p id="sponsors-count" class="text-3xl font-bold text-gray-800 mt-2">--</p>
            </div>
        </div>

        <div class="mt-12 bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold mb-6">Ações Rápidas</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <a href="news.html"
                    class="p-4 border rounded-lg hover:bg-orange-50 hover:border-orange-200 transition-all flex items-center justify-between">
                    <span>Criar Nova Notícia</span>
                    <span class="text-orange-500 font-bold">+</span>
                </a>
                <a href="team.html"
                    class="p-4 border rounded-lg hover:bg-orange-50 hover:border-orange-200 transition-all flex items-center justify-between">
                    <span>Adicionar Novo Membro</span>
                    <span class="text-orange-500 font-bold">+</span>
                </a>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="data.js"></script>
    <script src="admin.js"></script>
    <script>
        // Auth Check
        if (localStorage.getItem('admin_auth') !== 'true') {
            window.location.href = 'login.html';
        }

        async function loadStats() {
            const news = await Storage.get('news');
            const coaches = await Storage.get('coaches');
            const managers = await Storage.get('managers');
            const sponsors = await Storage.get('sponsors');

            document.getElementById('news-count').innerText = news.length;
            document.getElementById('players-count').innerText = coaches.length + managers.length;
            document.getElementById('sponsors-count').innerText = sponsors.length;
        }

        loadStats();
    </script>
</body>

</html>
