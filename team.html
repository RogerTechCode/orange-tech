<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Equipe - Admin Orange FC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            100: '#ffedd5',
                            500: '#f05137',
                            600: '#d9412a'
                        }
                    },
                    fontFamily: { 'poppins': ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 flex flex-col md:flex-row min-h-screen admin-body">
    <!-- Mobile Header -->
    <header
        class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-40 w-full">
        <div class="flex items-center space-x-3">
            <img src="ORANGE 3 (1).png"
                alt="Orange FC" class="w-10 h-10 object-contain drop-shadow-md">
            <h2 class="text-lg font-black font-poppins text-white uppercase tracking-tighter">ORANGE</h2>
        </div>
        <button id="mobile-menu-btn" class="p-2 text-gray-400 hover:text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>
    </header>

    <!-- Sidebar (Desktop/Tablet) -->
    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden lg:block sticky top-0 h-screen overflow-y-auto">
        <div class="p-6 flex items-center space-x-3">
            <img src="ORANGE 3 (1).png"
                alt="Orange FC" class="w-10 h-10 object-contain drop-shadow-md">
            <h2 class="text-xl font-black font-poppins text-white uppercase tracking-tighter">ORANGE</h2>
        </div>
        <nav class="mt-4 px-4 space-y-2">
            <a href="index.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-all text-slate-400 hover:text-white border-b border-slate-800 mb-4 pb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Sair pro Site</span>
            </a>
            <a href="dashboard.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-all"><span>Dashboard</span></a>
            <a href="news.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-all"><span>Notícias</span></a>
            <a href="team.html"
                class="flex items-center space-x-3 p-3 rounded-lg bg-orange-600 text-white font-bold"><span>Equipe</span></a>
            <a href="sponsors.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-all text-slate-400 hover:text-white"><span>Parceiros</span></a>
            <a href="backup.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-all border-t border-slate-800 mt-4 pt-4"><span>Backup
                    & Suporte</span></a>
            <button id="logout-btn-desktop"
                class="w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-red-900/50 text-red-400 mt-8 transition-all"><span>Sair</span></button>
        </nav>
    </aside>

    <!-- Mobile Menu Overlay -->
    <div id="admin-mobile-menu" class="fixed inset-0 bg-slate-900/95 z-50 p-6 flex flex-col hidden lg:hidden">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-3">
                <img src="ORANGE 3 (1).png"
                    alt="Orange FC" class="w-12 h-12 object-contain drop-shadow-md">
                <h2 class="text-xl font-black font-poppins text-white uppercase tracking-tighter">ORANGE</h2>
            </div>
            <button id="mobile-menu-close" class="p-2 text-gray-400 hover:text-white transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>
        <nav class="space-y-4 text-center">
            <a href="index.html" class="block text-2xl font-bold p-4 text-gray-400 hover:text-white">Sair pro
                Site</a>
            <a href="dashboard.html" class="block text-2xl font-bold p-4 text-white">Dashboard</a>
            <a href="news.html" class="block text-2xl font-bold p-4 text-white">Notícias</a>
            <a href="team.html" class="block text-3xl font-black p-4 text-orange-500">Equipe</a>
            <a href="sponsors.html" class="block text-2xl font-bold p-4 text-white">Parceiros</a>
            <a href="backup.html" class="block text-2xl font-bold p-4 text-gray-400">Backup & Suporte</a>
            <button id="logout-btn-mobile" class="w-full text-2xl font-bold p-4 text-red-500 mt-10">Sair</button>
        </nav>
    </div>

    <main class="flex-grow p-4 md:p-10 lg:p-12">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold text-slate-800">Gerenciar Equipe</h1>
            <button onclick="openModal()" class="bg-orange-600 text-white px-6 py-3 rounded-xl font-bold">+ Novo
                Membro</button>
        </div>

        <div class="mb-8 flex space-x-4">
            <button onclick="setTab('managers')"
                class="tab-btn px-6 py-2 rounded-full font-bold bg-orange-100 text-orange-600"
                data-tab="managers">Diretoria</button>
            <button onclick="setTab('coaches')"
                class="tab-btn px-6 py-2 rounded-full font-bold bg-slate-100 text-slate-500"
                data-tab="coaches">Comissão</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="px-8 py-4 uppercase text-xs font-bold text-slate-500">Nome</th>
                            <th class="px-8 py-4 uppercase text-xs font-bold text-slate-500">Cargo/Posição</th>
                            <th class="px-8 py-4 uppercase text-xs font-bold text-slate-500 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="team-table-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal"
        class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-6 md:p-10 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">Membro da Equipe</h2>
            <form id="team-form" class="space-y-4" novalidate>
                <input type="hidden" id="member-id">
                <input type="text" id="name" placeholder="Nome Completo" class="w-full p-3 border rounded-xl" required>
                <input type="text" id="role" placeholder="Cargo ou Posição" class="w-full p-3 border rounded-xl"
                    required>
                <div class="flex items-center space-x-4 p-2 bg-slate-50 rounded-xl border">
                    <div id="image-preview"
                        class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center overflow-hidden flex-shrink-0">
                        <span class="text-[10px] text-slate-500">Foto</span>
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Foto do Membro</label>
                        <input type="file" id="imageFile" accept="image/*"
                            class="w-full text-xs file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-orange-50 file:text-orange-700">
                    </div>
                    <input type="hidden" id="imageUrl">
                </div>
                <textarea id="bio" placeholder="Bio/Experiência" class="w-full p-3 border rounded-xl h-24"></textarea>
                <div class="flex space-x-3 pt-4">
                    <button type="button" onclick="saveMember()"
                        class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-bold">Salvar</button>
                    <button type="button" onclick="closeModal()"
                        class="flex-1 bg-slate-100 py-3 rounded-xl font-bold text-slate-500">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        let currentTab = 'managers';

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.tab === tab) {
                    btn.classList.replace('bg-slate-100', 'bg-orange-100');
                    btn.classList.replace('text-slate-500', 'text-orange-600');
                } else {
                    btn.classList.replace('bg-orange-100', 'bg-slate-100');
                    btn.classList.replace('text-orange-600', 'text-slate-500');
                }
            });
            loadTeam();
        }

        async function loadTeam() {
            let data = await Storage.get(currentTab);
            const body = document.getElementById('team-table-body');
            body.innerHTML = data.map(m => `
                <tr>
                    <td class="px-8 py-4 font-bold">${m.name}</td>
                    <td class="px-8 py-4 text-slate-500">${m.position || m.specialty || m.role}</td>
                    <td class="px-8 py-4 text-right">
                        <button onclick="editMember('${m.id}')" class="text-blue-500 font-bold mr-4 text-sm">Editar</button>
                        <button onclick="deleteMember('${m.id}')" class="text-red-500 font-bold text-sm">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('team-form').reset();
            document.getElementById('member-id').value = '';
            document.getElementById('image-preview').innerHTML = '<span class="text-[10px] text-slate-500">Foto</span>';
            document.getElementById('imageUrl').value = '';
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function deleteMember(id) {
            if (confirm('Deseja excluir?')) { await Storage.delete(currentTab, id); await loadTeam(); }
        }

        async function editMember(id) {
            let data = await Storage.get(currentTab);
            const item = data.find(m => m.id === id);
            if (item) {
                openModal();
                document.getElementById('member-id').value = item.id;
                document.getElementById('name').value = item.name;
                document.getElementById('role').value = item.position || item.specialty || item.role;
                document.getElementById('bio').value = item.bio || '';
                document.getElementById('imageUrl').value = item.imageUrl || '';
                if (item.imageUrl) {
                    document.getElementById('image-preview').innerHTML = `<img src="${item.imageUrl}" class="w-full h-full object-cover">`;
                }
            }
        }

        async function saveMember() {
            const id = document.getElementById('member-id').value;
            const name = document.getElementById('name').value;
            const position = document.getElementById('role').value;
            if (!name || !position) {
                alert('Por favor, preencha o nome e o cargo do membro.');
                return;
            }
            const item = {
                name: name,
                position: position,
                imageUrl: document.getElementById('imageUrl').value || '',
                bio: document.getElementById('bio').value || ''
            };
            try {
                if (id) await Storage.update(currentTab, id, item);
                else await Storage.add(currentTab, item);
                closeModal();
                await loadTeam();
            } catch (err) {
                alert('Erro ao salvar: ' + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('imageFile').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const base64 = await Storage.fileToBase64(file);
                    document.getElementById('imageUrl').value = base64;
                    document.getElementById('image-preview').innerHTML = `<img src="${base64}" class="w-full h-full object-cover">`;
                }
            });
            loadTeam();
        });
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>

</html>
